apiVersion: v1
kind: Service
metadata:
  name: users-service
spec:
  selector:
    app: users
  type: LoadBalancer
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: users-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: users
  template:
    metadata:
      labels:
        app: users
    spec:
      containers:
        - name: users-api
          image: doc2346613/kub-dep-users:latest
          env:
            - name: MONGO_CONNECTION_URI
              value: "mongodb+srv://ligesh_mongo_eks:XpZEGadj6D5He7oF@cluster0.qb5fhb7.mongodb.net/users?appName=Cluster0&retryWrites=true&w=majority"
              name: AUTH_API_ADDRESS
              value: "auth-service.default:3000"

